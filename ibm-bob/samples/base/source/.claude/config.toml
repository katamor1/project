# ibm-bob/samples/base/source/.claude/config.toml
# Defines project-scoped Claude profiles for the IBM BOB baseline sample.
# This exists so Claude uses workspace profiles while scripts remain the build/test source of truth.
# RELEVANT FILES: ibm-bob/samples/base/source/AGENTS.md, ibm-bob/samples/base/source/scripts/build_clang.bat, ibm-bob/samples/base/source/scripts/test_clang.bat

[profiles.ibm-bob-clang-win]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"

[profiles.ibm-bob-vc2026]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
