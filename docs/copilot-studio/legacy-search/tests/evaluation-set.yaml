# docs/copilot-studio/legacy-search/tests/evaluation-set.yaml
# This file contains the v2 evaluation set for the IBM Bob legacy search prompt pack.
# This file exists so the team can test routing, abstain behavior, handoff packets, and final output shape.
# RELEVANT FILES: docs/copilot-studio/legacy-search/README.md, docs/copilot-studio/legacy-search/routing-matrix.md, docs/copilot-studio/legacy-search/pilot-runbook.md
version: 2

coverage_targets:
  - normal_search
  - terminology_variation
  - source_conflict
  - insufficient_evidence
  - excel_pdf
  - broad_question
  - out_of_scope
  - renewal_impact
  - diff_check
  - document_discovery

cases:
  - id: Q01
    category: normal_search
    question: "会員登録完了メールは、どの条件で送られますか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-grounded-answerer"
    should_abstain: false
  - id: Q02
    category: normal_search
    question: "管理者が顧客ステータスを更新できる画面はどれですか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-grounded-answerer"
    should_abstain: false
  - id: Q03
    category: terminology_variation
    question: "旧画面の『契約一覧』って、今の資料では何と呼ばれていますか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-grounded-answerer"
    should_abstain: false
  - id: Q04
    category: terminology_variation
    question: "『与信判定』と『審査チェック』は同じ処理ですか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-grounded-answerer"
    should_abstain: false
  - id: Q05
    category: source_conflict
    question: "返品申請の締切日は、資料によって違いがありますか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-gap-reporter"
    should_abstain: true
  - id: Q06
    category: source_conflict
    question: "運用手順書と業務仕様書で、請求確定タイミングは一致していますか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-gap-reporter"
    should_abstain: true
  - id: Q07
    category: insufficient_evidence
    question: "加盟店ランクの自動更新ロジックを教えてください。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-gap-reporter"
    should_abstain: true
  - id: Q08
    category: insufficient_evidence
    question: "この機能の例外通知メール本文まで確定していますか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-gap-reporter"
    should_abstain: true
  - id: Q09
    category: excel_pdf
    question: "料金表 Excel では、深夜加算の条件はどう書かれていますか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-grounded-answerer"
    should_abstain: false
  - id: Q10
    category: excel_pdf
    question: "PDF の運用マニュアルで、CSV 取込の失敗時対応はどこにありますか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-grounded-answerer"
    should_abstain: false
  - id: Q11
    category: broad_question
    question: "このサービス全体の業務フローを全部教えてください。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-gap-reporter"
