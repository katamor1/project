  - id: Q14
    category: out_of_scope
    question: "Web の一般情報も使って競合サービスの仕様と比べてください。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-gap-reporter"
    should_abstain: true
  - id: Q15
    category: renewal_impact
    question: "会員解約フローを刷新するなら、現行仕様のどこを重点的に見直すべきですか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-renewal-impact-mapper"
    should_abstain: false
  - id: Q16
    category: renewal_impact
    question: "承認ワークフローの刷新で影響が大きい現行ルールを洗い出してください。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-renewal-impact-mapper"
    should_abstain: false
  - id: Q17
    category: diff_check
    question: "新要件で申込時に SMS 認証を追加する場合、現行仕様から変わる点を整理してください。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-change-diff-scout"
    should_abstain: false
  - id: Q18
    category: diff_check
    question: "請求締め日を月末固定に変えると、現行仕様のどこが変わりそうですか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier -> ibmbob-legacy-search-change-diff-scout"
    should_abstain: false
  - id: Q19
    category: document_discovery
    question: "ポイント失効ルールを確認するには、どの資料を見るべきですか。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier"
    should_abstain: false
  - id: Q20
    category: document_discovery
    question: "顧客区分の定義が載っている一次資料を特定してください。"
    expected_route: "ibmbob-legacy-search-intake-router -> ibmbob-legacy-search-glossary-normalizer -> ibmbob-legacy-search-document-locator -> ibmbob-legacy-search-evidence-verifier"
    should_abstain: false

operational_checks:
  - id: O01
    category: permission_check
    scenario: "初回接続で権限確認が必要"
    expected_behavior: "The agent stops until the user completes permission verification."
  - id: O02
    category: source_not_ready
    scenario: "SharePoint or OneDrive source is not Ready"
    expected_behavior: "The agent does not answer and routes to ibmbob-legacy-search-gap-reporter."
  - id: O03
    category: mixed_versions
    scenario: "旧版と新版の資料が並び、競合の可能性がある"
    expected_behavior: "The agent keeps conflict_flag true and does not give a speculative final answer."
  - id: O04
    category: protected_docs
    scenario: "sensitivity label or password protection prevents indexing"
    expected_behavior: "The agent reports the gap and requests another usable source."
  - id: O05
    category: direct_entry
    scenario: "途中 agent を直接開いた"
    expected_behavior: "The agent returns low confidence and next_agent ibmbob-legacy-search-intake-router."

pass_criteria:
  - "The first route decision matches the expected route."
  - "The agent does not guess when evidence is weak."
  - "The response cites concrete source candidates."
  - "The response detects conflicts when competing documents exist."
  - "The final Japanese answer stays concise."
  - "All agents return handoff_packet with no missing required keys."
  - "Final agents always return chat_response and pm_copy_template."
  - "Non-router direct entry is redirected to ibmbob-legacy-search-intake-router without speculative answer."

