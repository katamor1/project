# docs/copilot-studio/legacy-search/tests/evaluation-set.yaml
# This file contains the v1 evaluation set for the Copilot Studio legacy search prompt pack.
# This file exists so the team can test routing, grounded answers, conflict handling, and abstain behavior.
# RELEVANT FILES: docs/copilot-studio/legacy-search/README.md, docs/copilot-studio/legacy-search/routing-matrix.md, docs/copilot-studio/legacy-search/shared-io-contract.yaml
version: 1

coverage_targets:
  - normal_search
  - terminology_variation
  - source_conflict
  - insufficient_evidence
  - excel_pdf
  - broad_question
  - out_of_scope
  - renewal_impact
  - diff_check
  - document_discovery

cases:
  - id: Q01
    category: normal_search
    question: "会員登録完了メールは、どの条件で送られますか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Grounded Answerer"
    should_abstain: false
  - id: Q02
    category: normal_search
    question: "管理者が顧客ステータスを更新できる画面はどれですか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Grounded Answerer"
    should_abstain: false
  - id: Q03
    category: terminology_variation
    question: "旧画面の『契約一覧』って、今の資料では何と呼ばれていますか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Grounded Answerer"
    should_abstain: false
  - id: Q04
    category: terminology_variation
    question: "『与信判定』と『審査チェック』は同じ処理ですか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Grounded Answerer"
    should_abstain: false
  - id: Q05
    category: source_conflict
    question: "返品申請の締切日は、資料によって違いがありますか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Gap Reporter"
    should_abstain: true
  - id: Q06
    category: source_conflict
    question: "運用手順書と業務仕様書で、請求確定タイミングは一致していますか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Gap Reporter"
    should_abstain: true
  - id: Q07
    category: insufficient_evidence
    question: "加盟店ランクの自動更新ロジックを教えてください。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Gap Reporter"
    should_abstain: true
  - id: Q08
    category: insufficient_evidence
    question: "この機能の例外通知メール本文まで確定していますか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Gap Reporter"
    should_abstain: true
  - id: Q09
    category: excel_pdf
    question: "料金表 Excel では、深夜加算の条件はどう書かれていますか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Grounded Answerer"
    should_abstain: false
  - id: Q10
    category: excel_pdf
    question: "PDF の運用マニュアルで、CSV 取込の失敗時対応はどこにありますか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Grounded Answerer"
    should_abstain: false
  - id: Q11
    category: broad_question
    question: "このサービス全体の業務フローを全部教えてください。"
    expected_route: "Intake Router -> Gap Reporter"
    should_abstain: true
  - id: Q12
    category: broad_question
    question: "現行システムの仕様をざっくり全部まとめてください。"
    expected_route: "Intake Router -> Gap Reporter"
    should_abstain: true
  - id: Q13
    category: out_of_scope
    question: "GitHub のコードを見て、API 実装の詳細も教えてください。"
    expected_route: "Intake Router -> Gap Reporter"
    should_abstain: true
  - id: Q14
    category: out_of_scope
    question: "Web の一般情報も使って競合サービスの仕様と比べてください。"
    expected_route: "Intake Router -> Gap Reporter"
    should_abstain: true
  - id: Q15
    category: renewal_impact
    question: "会員解約フローを刷新するなら、現行仕様のどこを重点的に見直すべきですか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Renewal Impact Mapper"
    should_abstain: false
  - id: Q16
    category: renewal_impact
    question: "承認ワークフローの刷新で影響が大きい現行ルールを洗い出してください。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Renewal Impact Mapper"
    should_abstain: false
  - id: Q17
    category: diff_check
    question: "新要件で申込時に SMS 認証を追加する場合、現行仕様から変わる点を整理してください。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Change Diff Scout"
    should_abstain: false
  - id: Q18
    category: diff_check
    question: "請求締め日を月末固定に変えると、現行仕様のどこが変わりそうですか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier -> Change Diff Scout"
    should_abstain: false
  - id: Q19
    category: document_discovery
    question: "ポイント失効ルールを確認するには、どの資料を見るべきですか。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier"
    should_abstain: false
  - id: Q20
    category: document_discovery
    question: "顧客区分の定義が載っている一次資料を特定してください。"
    expected_route: "Intake Router -> Glossary Normalizer -> Document Locator -> Evidence Verifier"
    should_abstain: false

pass_criteria:
  - "The first route decision matches the expected route."
  - "The agent does not guess when evidence is weak."
  - "The response cites concrete source candidates."
  - "The response detects conflicts when competing documents exist."
  - "The final Japanese answer stays concise."
