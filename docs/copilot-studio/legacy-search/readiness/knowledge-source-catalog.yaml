# docs/copilot-studio/legacy-search/readiness/knowledge-source-catalog.yaml
# This file defines the readiness catalog for the single pilot knowledge source.
# This file exists to keep the source scope, ownership, and description template in one structured place.
# RELEVANT FILES: docs/copilot-studio/legacy-search/readiness/knowledge-onboarding.md, docs/copilot-studio/legacy-search/implementation-guide.md, docs/copilot-studio/legacy-search/shared-io-contract.yaml
version: 1

allowed_source_types:
  - sharepoint
  - onedrive

required_source_keys:
  - domain
  - source_name
  - source_type
  - base_url
  - include_paths
  - exclude_paths
  - owner_role
  - approval_signal
  - freshness_rule
  - risk_notes
  - description_template

sources:
  - domain: "<domain>"
    source_name: "<domain>-legacy-search-main"
    source_type: "sharepoint"
    base_url: "<sharepoint-or-onedrive-url>"
    include_paths:
      - "<included-folder-or-library>"
    exclude_paths:
      - "<excluded-folder-or-library>"
    owner_role: "<knowledge-owner-role>"
    approval_signal: "<how-approved-docs-are-identified>"
    freshness_rule: "<how-current-docs-are-identified>"
    risk_notes:
      - "<risk-or-open-point>"
    description_template:
      - "対象業務:"
      - "含む文書:"
      - "含まない文書:"
      - "主な用語:"
      - "更新責任者:"
      - "鮮度の目安:"
