# .copilot/routing/legacy-kb-ingest-matrix.yaml
# Defines the ingest routing for turning raw legacy files into normalized map, chunk, and relation artifacts.
# This exists so ingestion can be tracked separately from query and downstream SDLC generation.
# RELEVANT FILES: .copilot/prompts/K0_runtime_orchestrator.md, .copilot/prompts/K4_relation_extractor.md, docs/external-runtime/legacy-kb/data-pipeline.md
version: 1
flow_name: legacy-kb-ingest
agents:
  - id: K0_runtime_orchestrator
    artifact_type: runtime_task_packet
    prompt_path: .copilot/prompts/K0_runtime_orchestrator.md
  - id: K1_intake_normalizer
    artifact_type: ingest_job
    prompt_path: .copilot/prompts/K1_intake_normalizer.md
  - id: K2_taxonomy_mapper
    artifact_type: document_taxonomy_bundle
    prompt_path: .copilot/prompts/K2_taxonomy_mapper.md
  - id: K3_summary_tree_builder
    artifact_type: summary_tree_bundle
    prompt_path: .copilot/prompts/K3_summary_tree_builder.md
  - id: K4_relation_extractor
    artifact_type: relation_edge_bundle
    prompt_path: .copilot/prompts/K4_relation_extractor.md
  - id: K9_runtime_eval_monitor
    artifact_type: runtime_eval_note
    prompt_path: .copilot/prompts/K9_runtime_eval_monitor.md
entry_conditions:
  - source: raw_files
    when: ingest_requested
  - source: changed_files
    when: reindex_requested
standard_route:
  - from: K0_runtime_orchestrator
    to: K1_intake_normalizer
    when: ingest_task_ready
  - from: K1_intake_normalizer
    to: K2_taxonomy_mapper
    when: normalized_documents_ready
  - from: K2_taxonomy_mapper
    to: K3_summary_tree_builder
    when: taxonomy_bundle_ready
  - from: K3_summary_tree_builder
    to: K4_relation_extractor
    when: summary_tree_ready
  - from: K4_relation_extractor
    to: K9_runtime_eval_monitor
    when: relation_edges_ready
gate_rules:
  - condition: missing_required_metadata
    return_to: K0_runtime_orchestrator
    result: human_checkpoint_required
  - condition: acl_attach_failed
    return_to: K0_runtime_orchestrator
    result: human_checkpoint_required
terminal_states:
  - complete
  - human_checkpoint_required
