# .copilot/routing/integration-matrix.yaml
# Defines the integration lane routing from execution packs into skeleton code draft bundles, review, and approval.
# This exists so integration handoff can be tracked separately from execution prep and review recording.
# RELEVANT FILES: .copilot/prompts/P15_integration_bundle_planner.md, .copilot/prompts/P20_integration_reviewer.md, docs/sdlc/README.md
version: 1
flow_name: sdlc-integration-lane
agents:
  - id: P14_execution_reviewer
    artifact_type: execution_review_findings
    prompt_path: .copilot/prompts/P14_execution_reviewer.md
  - id: P15_integration_bundle_planner
    artifact_type: code_draft_packet
    prompt_path: .copilot/prompts/P15_integration_bundle_planner.md
  - id: P16_frontend_draft_author
    artifact_type: frontend_draft_bundle
    prompt_path: .copilot/prompts/P16_frontend_draft_author.md
  - id: P17_backend_draft_author
    artifact_type: backend_draft_bundle
    prompt_path: .copilot/prompts/P17_backend_draft_author.md
  - id: P18_sqlite_draft_author
    artifact_type: sqlite_draft_bundle
    prompt_path: .copilot/prompts/P18_sqlite_draft_author.md
  - id: P19_test_draft_author
    artifact_type: test_draft_bundle
    prompt_path: .copilot/prompts/P19_test_draft_author.md
  - id: P20_integration_reviewer
    artifact_type: integration_review_findings
    prompt_path: .copilot/prompts/P20_integration_reviewer.md
  - id: P21_approval_pack_author
    artifact_type: approval_pack
    prompt_path: .copilot/prompts/P21_approval_pack_author.md
  - id: P8_review_record
    artifact_type: review_record
    prompt_path: .copilot/prompts/P8_review_record.md
  - id: P9_eval_monitor
    artifact_type: eval_report
    prompt_path: .copilot/prompts/P9_eval_monitor.md
entry_conditions:
  - source: P14_execution_reviewer
    when: execution_review_passed
    handoff_artifacts:
      - execution_bundle_packet
      - target_repo_map
      - frontend_codepack
      - backend_codepack
      - sqlite_change_pack
      - test_codepack
  - source: execution_bundle_packet
    when: execution_bundle_ready
standard_route:
  - from: P15_integration_bundle_planner
    to: P16_frontend_draft_author
    when: code_draft_packet_ready
  - from: P16_frontend_draft_author
    to: P17_backend_draft_author
    when: frontend_draft_bundle_ready
  - from: P17_backend_draft_author
    to: P18_sqlite_draft_author
    when: backend_draft_bundle_ready
  - from: P18_sqlite_draft_author
    to: P19_test_draft_author
    when: sqlite_draft_bundle_ready
  - from: P19_test_draft_author
    to: P20_integration_reviewer
    when: test_draft_bundle_ready
  - from: P20_integration_reviewer
    to: P21_approval_pack_author
    when: integration_review_passed
  - from: P21_approval_pack_author
    to: P8_review_record
    when: approval_pack_ready
  - from: P8_review_record
    to: P9_eval_monitor
    when: review_record_ready
return_routes:
  - reviewer: P20_integration_reviewer
    decision: revise
    category: frontend_contract
    return_to: P16_frontend_draft_author
  - reviewer: P20_integration_reviewer
    decision: revise
    category: backend_contract
    return_to: P17_backend_draft_author
  - reviewer: P20_integration_reviewer
    decision: revise
    category: sqlite_migration
    return_to: P18_sqlite_draft_author
  - reviewer: P20_integration_reviewer
    decision: revise
    category: test_coverage
    return_to: P19_test_draft_author
  - reviewer: P20_integration_reviewer
    decision: revise
    category: bundle_boundary
    return_to: P15_integration_bundle_planner
  - reviewer: P20_integration_reviewer
    decision: revise
    category: repo_mapping
    return_to: P15_integration_bundle_planner
  - reviewer: P20_integration_reviewer
    decision: block
    return_to: P0_orchestrator
    note: human_checkpoint を要求して integration 前提を見直す
terminal_states:
  - complete
  - human_checkpoint_required
